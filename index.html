<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lika & Giorgi 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }
        
        h1 {
            color: #d50000;
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .names {
            font-size: 32px;
            color: #764ba2;
            margin: 20px 0;
            font-weight: bold;
        }
        
        .names span {
            color: #d50000;
            display: block;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin: 30px 0;
            transition: transform 0.3s ease;
            font-weight: bold;
        }
        
        button:hover {
            transform: scale(1.1);
        }
        
        .hidden-content {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.5s ease;
        }
        
        .hidden-content.show {
            display: block;
        }
        
        .special-date {
            font-size: 28px;
            color: #d50000;
            margin: 20px 0;
            font-weight: bold;
        }
        
        .message {
            font-size: 20px;
            color: #764ba2;
            margin: 20px 0;
            line-height: 1.8;
            font-style: italic;
        }
        
        .gallery {
            margin-top: 40px;
        }
        
        .gallery h2 {
            color: #764ba2;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .gallery img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }
        
        .gallery img:hover {
            transform: scale(1.05);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .heart {
            color: #d50000;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="heart">❤️</span> Lika & Giorgi <span class="heart">❤️</span></h1>
        
        <div class="names">
            <span>Lika</span>
            ♡
            <span>Giorgi</span>
        </div>
        
        <button onclick="revealDate()">დააჭირე თუ გინდა გაიგო დრო 💕</button>
        
        <div class="hidden-content" id="hiddenContent">
            <div class="special-date">
                📅 2 ივნისი 2024
            </div>
            
            <div class="message">
                ჩემო პატარა 💕<br>
                მიყვახარ 💗<br>
                ჩემი სამყარო ხარ 🌍<br>
                და ჩემი ყველაზე დიდი ბედნიერება ✨
            </div>
        </div>
        
        <div class="gallery">
            <h2>Our Beautiful Memories 📸</h2>
            <div class="gallery-container">
                <img src="photos/photo1.jpg" alt="Our moment 1" onerror="this.style.display='none'">
                <img src="photos/photo2.jpg" alt="Our moment 2" onerror="this.style.display='none'">
                <img src="photos/photo3.jpg" alt="Our moment 3" onerror="this.style.display='none'">
                <img src="photos/photo4.jpg" alt="Our moment 4" onerror="this.style.display='none'">
            </div>
        </div>
    </div>
    
    <script>
        function revealDate() {
            const content = document.getElementById('hiddenContent');
            content.classList.toggle('show');
        }
    </script>
</body>
</html>
