<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Georgian Love Gifts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #e60000;
        }
        #giftButton {
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #e60000;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #giftButton:hover {
            background-color: #c70000;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Romantic Georgian Love Gifts</h1>
    <p>Discover the perfect gifts for your loved one!</p>
    <button id="giftButton" onclick="showGifts()">See our Gifts</button>

    <div id="giftList" style="display: none;">
        <h2>Our Gifts:</h2>
        <ul>
            <li>Traditional Georgian Jewelry</li>
            <li>Handmade Georgian Pottery</li>
            <li>Luxury Wines from Kakheti</li>
            <li>Custom Georgian Recipe Books</li>
            <li>Silk Scarves with Georgian Patterns</li>
        </ul>
    </div>

    <script>
        function showGifts() {
            const giftList = document.getElementById('giftList');
            giftList.style.display = (giftList.style.display === 'none') ? 'block' : 'none';
        }
    </script>
</body>
</html>
